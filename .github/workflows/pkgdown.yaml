# Build the pkgdown site on every push to `main` and deploy to
# `gh-pages`. Heavy dependencies (torch, terra, geodata, reticulate)
# are skipped -- the site builds from already-rendered vignettes
# (`articles` folder) and exported function docs, not from re-running
# compute-heavy chunks.
#
# Deployment requires Pages enabled on the repo, Source = gh-pages.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::DiagrammeR
            any::ggdag
            any::ggridges
            any::ggnewscale
            any::patchwork
            any::RColorBrewer
            any::scales
            any::tidyr
            any::dplyr
            local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
