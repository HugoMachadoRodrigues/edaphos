      - text: Causal-discovery trio (expert × LLM × data-driven)
        href: articles/causal-discovery-trio.html
      - text: LLM-KG benchmark (Gemma 4 × GPT × Claude)
        href: articles/llm-kg-benchmark.html
      - text: Annotation workflow (pre-annotation + Shiny review)
        href: articles/llm-annotation-workflow.html
