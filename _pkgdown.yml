url: https://hugomachadorodrigues.github.io/edaphos

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2ECC71"
    navbar-bg: "#27AE60"
  includes:
    in_header: |
      <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
      <script>
        document.addEventListener("DOMContentLoaded", function () {
          // pkgdown wraps fenced ```mermaid blocks as
          // <pre><code class="language-mermaid">...</code></pre>.
          // Convert them in-place to <pre class="mermaid"> which
          // mermaid.run() picks up.
          document.querySelectorAll("pre > code.language-mermaid").forEach(function (codeEl) {
            var pre = codeEl.parentElement;
            var div = document.createElement("pre");
            div.className = "mermaid";
            div.textContent = codeEl.textContent;
            pre.replaceWith(div);
          });
          if (window.mermaid) {
            window.mermaid.initialize({ startOnLoad: false, theme: "default" });
            window.mermaid.run();
          }
        });
      </script>
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "edaphos — Disruptive algorithms for Digital Soil Mapping"
    twitter:
      creator: "@Hugo_MRodrigues"
      card: summary_large_image

development:
  mode: auto

home:
  title: edaphos — Frontier algorithms for Digital Soil Mapping
  description: >
    Six research pillars confronting specific methodological gaps in
    DSM: Causal AI (with LLM-driven KG), Physics-Informed ML, 4D
    Pedometry, Foundation Models, Autonomous Active Learning, and
    Quantum ML. Unified uncertainty API + cross-pillar bridges.
  links:
  - text: Pedometrics community
    href: https://pedometrics.org
  - text: Zhang & Wadoux (2026) — Causal DSM
    href: https://doi.org/10.1111/ejss.70284

authors:
  Hugo Rodrigues:
    href: https://orcid.org/0000-0002-8070-8126

